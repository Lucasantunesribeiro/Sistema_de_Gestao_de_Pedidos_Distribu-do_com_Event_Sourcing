name: ordersystem-prod

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ordersystem}
      POSTGRES_USER: ${POSTGRES_USER:-ordersystem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ordersystem} -d ${POSTGRES_DB:-ordersystem}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m

  unified-order-system:
    image: ${APP_IMAGE:-ghcr.io/lucasantunesribeiro/unified-order-system:latest}
    build:
      context: .
      dockerfile: unified-order-system/Dockerfile
    ports:
      - "80:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ordersystem}
      DB_USERNAME: ${POSTGRES_USER:-ordersystem}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: "false"
      SECURITY_SECRET: ${SECURITY_SECRET:?SECURITY_SECRET is required}
      SECURITY_ENFORCE_AUTH: ${SECURITY_ENFORCE_AUTH:-true}
      SECURITY_CORS_ALLOWED_ORIGINS: ${SECURITY_CORS_ALLOWED_ORIGINS:-*}
      REDIS_ENABLED: "false"
      CACHE_TYPE: simple
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 640m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
