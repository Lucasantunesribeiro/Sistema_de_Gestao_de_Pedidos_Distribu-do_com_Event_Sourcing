name: orderflow

services:
  postgres:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-ordersystem}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    ports:
      - "5432:5432"
    volumes:
      - ordersystem-postgres-data-new:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ordersystem}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - order-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  rabbitmq:
    image: rabbitmq:3.11-management
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: "${SPRING_RABBITMQ_USERNAME:-guest}"
      RABBITMQ_DEFAULT_PASS: "${SPRING_RABBITMQ_PASSWORD:-guest}"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ordersystem-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - order-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - ordersystem-redis-data:/data
    networks:
      - order-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-sandbox:
    image: wiremock/wiremock:3.9.1
    command: ["--global-response-templating", "--verbose"]
    ports:
      - "8089:8080"
    volumes:
      - ./infra/payment-sandbox:/home/wiremock
    networks:
      - order-network
    restart: unless-stopped

  unified-order-system:
    build:
      context: .
      dockerfile: unified-order-system/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: production,docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ordersystem}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      DDL_AUTO: none
      SPRING_FLYWAY_ENABLED: "true"
      SECURITY_SECRET: ${SECURITY_SECRET:?SECURITY_SECRET is required}
      SECURITY_ENFORCE_AUTH: "true"
      SECURITY_BOOTSTRAP_ADMIN_ENABLED: ${SECURITY_BOOTSTRAP_ADMIN_ENABLED:-true}
      SECURITY_BOOTSTRAP_ADMIN_USERNAME: ${SECURITY_BOOTSTRAP_ADMIN_USERNAME:-admin}
      SECURITY_BOOTSTRAP_ADMIN_PASSWORD: ${SECURITY_BOOTSTRAP_ADMIN_PASSWORD:-change-this-admin-password}
      SECURITY_BOOTSTRAP_ADMIN_EMAIL: ${SECURITY_BOOTSTRAP_ADMIN_EMAIL:-admin@local.orderflow}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_ENABLED: "true"
      CACHE_TYPE: redis
      CACHE_TTL: ${CACHE_TTL:-1h}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME:-guest}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD:-guest}
      OUTBOX_ENABLED: "true"
      PAYMENT_GATEWAY_ENABLED: "true"
      PAYMENT_GATEWAY_BASE_URL: http://payment-sandbox:8080
      PAYMENT_GATEWAY_API_KEY: ${PAYMENT_GATEWAY_API_KEY:-demo-portfolio-key}
      LOG_LEVEL: INFO
      SECURITY_CORS_ALLOWED_ORIGINS: ${SECURITY_CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:8080}
      TRACING_ENABLED: "true"
      TRACING_SAMPLE_RATE: "1.0"
      ZIPKIN_BASE_URL: http://tempo:9411
      MANAGEMENT_HEALTH_REDIS_ENABLED: "false"
      MANAGEMENT_HEALTH_RABBIT_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      payment-sandbox:
        condition: service_started
    networks:
      - order-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      unified-order-system:
        condition: service_healthy
    networks:
      - order-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  ordersystem-postgres-data-new:
  ordersystem-rabbitmq-data:
  ordersystem-redis-data:

networks:
  order-network:
    driver: bridge
