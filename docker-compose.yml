name: ordersystem

services:
  postgres:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-ordersystem}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    ports:
      - "5432:5432"
    volumes:
      - ordersystem-postgres-data-new:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ordersystem}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - order-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  rabbitmq:
    image: rabbitmq:3.11-management
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: "${SPRING_RABBITMQ_USERNAME:-guest}"
      RABBITMQ_DEFAULT_PASS: "${SPRING_RABBITMQ_PASSWORD:-guest}"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ordersystem-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - order-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=password
    volumes:
      - ordersystem-redis-data:/data
    networks:
      - order-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  unified-order-system:
    build:
      context: .
      dockerfile: unified-order-system/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ordersystem}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      DDL_AUTO: none
      SPRING_FLYWAY_ENABLED: "true"
      SECURITY_SECRET: ${SECURITY_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      SECURITY_ENFORCE_AUTH: ${SECURITY_ENFORCE_AUTH:-false}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_ENABLED: "false"
      CACHE_TYPE: simple
      LOG_LEVEL: INFO
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - order-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  ordersystem-postgres-data-new:
  ordersystem-rabbitmq-data:
  ordersystem-redis-data:

networks:
  order-network:
    driver: bridge
