<section class="login-page">
  <div class="login-panel">
    <div class="login-copy">
      <span class="eyebrow">Secure runtime</span>
      <h1>OrderFlow Control Plane</h1>
      <p>
        Sign in with an application account to access orders, inventory, payments and operational metrics.
      </p>
    </div>

    <form class="login-form card" [formGroup]="loginForm" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label" for="username">Username or email</label>
        <input id="username" class="form-control" formControlName="username" autocomplete="username" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          class="form-control"
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
      </div>

      <div class="alert alert-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button class="btn btn-primary login-submit" type="submit" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </div>
</section>
