name: CI

on:
  push:
    branches:
      - main
      - prod-ready-rewrite
  pull_request:
    branches:
      - main
      - prod-ready-rewrite

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build and verify
        run: mvn -q clean verify
      - name: Run Checkstyle
        run: mvn checkstyle:check
      - name: Dependency scan
        uses: owasp/dependency-check-action@v6
        with:
          project: Distributed-Order-System
          format: "ALL"
