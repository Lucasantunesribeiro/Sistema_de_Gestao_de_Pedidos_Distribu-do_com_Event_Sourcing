name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install active shared libraries
        run: mvn -pl libs/common-events,libs/common-security,libs/common-messaging,libs/common-observability -am -DskipTests install -q

      - name: Build and test
        run: mvn -f unified-order-system/pom.xml clean test -B

      - name: PR size check
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | wc -l)
          echo "Files changed: $CHANGED"
          if [ "$CHANGED" -gt 50 ]; then
            echo "::warning::Large PR ($CHANGED files). Consider breaking into smaller PRs."
          fi
