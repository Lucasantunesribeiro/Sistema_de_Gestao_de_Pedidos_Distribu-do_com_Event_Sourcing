name: Deploy to EC2

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: production
      url: http://${{ secrets.EC2_HOST }}:4200

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            cd /opt/ordersystem

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Setting up environment ==="
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "WARNING: .env created from template — set real secrets before continuing"
              exit 1
            fi

            echo "=== Building and restarting services ==="
            docker compose pull postgres rabbitmq redis payment-sandbox
            docker compose up -d --build --remove-orphans unified-order-system frontend

            echo "=== Waiting for health check ==="
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1 && curl -sf http://localhost:4200/login > /dev/null 2>&1; then
                echo "Application and frontend are healthy"
                break
              fi
              echo "Waiting... ($i/12)"
              sleep 10
            done

            curl -sf http://localhost:8080/actuator/health || { echo "Health check failed"; exit 1; }
            curl -sf http://localhost:4200/login || { echo "Frontend health check failed"; exit 1; }

            echo "=== Cleanup old images ==="
            docker image prune -f

            echo "=== Deploy complete ==="
