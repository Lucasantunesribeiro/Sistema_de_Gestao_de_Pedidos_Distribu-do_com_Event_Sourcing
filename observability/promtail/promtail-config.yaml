# Promtail Configuration for Log Shipping
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=ordersystem"]

    relabel_configs:
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

      # Extract service name from compose
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

      # Extract project name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'

      # Add environment label
      - replacement: 'docker'
        target_label: 'environment'

    pipeline_stages:
      # Parse JSON logs
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            message: message
            correlationId: correlationId
            traceId: traceId
            spanId: spanId
            service: service
            thread: thread

      # Extract timestamp
      - timestamp:
          source: timestamp
          format: RFC3339Nano

      # Parse log level
      - labels:
          level:
          service:
          correlationId:
          traceId:

      # Add structured metadata
      - template:
          source: output
          template: '{{ .message }}'

      # Drop health check logs (optional - reduces noise)
      - match:
          selector: '{service="unified-order-system"}'
          stages:
            - drop:
                expression: '.*GET /health.*'
                drop_counter_reason: health_check

  # File-based logs (fallback)
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*log

    pipeline_stages:
      - match:
          selector: '{job="varlogs"}'
          stages:
            - regex:
                expression: '^(?P<timestamp>\S+\s+\S+)\s+(?P<level>\S+)\s+(?P<message>.*)$'
            - labels:
                level:
