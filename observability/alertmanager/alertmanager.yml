# Alertmanager Configuration
global:
  resolve_timeout: 5m
  # SMTP configuration (update with your SMTP settings)
  # smtp_smarthost: 'smtp.gmail.com:587'
  # smtp_from: 'alerts@yourdomain.com'
  # smtp_auth_username: 'your-email@gmail.com'
  # smtp_auth_password: 'your-app-password'
  # smtp_require_tls: true

# Templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree for alert distribution
route:
  # Default receiver
  receiver: 'default'

  # Group alerts by these labels
  group_by: ['alertname', 'cluster', 'service']

  # Wait time before sending initial notification
  group_wait: 10s

  # Wait time before sending notification about new alerts
  group_interval: 10s

  # Wait time before sending notification about resolved alerts
  repeat_interval: 3h

  # Child routes with specific matching criteria
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 5s
      repeat_interval: 30m
      continue: true

    # Warning alerts - standard notification
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      repeat_interval: 2h
      continue: true

    # Info alerts - batched notification
    - match:
        severity: info
      receiver: 'info-alerts'
      group_wait: 5m
      group_interval: 10m
      repeat_interval: 12h

    # Database alerts
    - match:
        component: database
      receiver: 'database-team'
      group_by: ['alertname', 'instance']
      continue: true

    # Application alerts
    - match:
        component: application
      receiver: 'dev-team'
      group_by: ['alertname', 'instance']
      continue: true

    # Business metrics alerts
    - match:
        component: business
      receiver: 'business-team'
      group_by: ['alertname']
      continue: true

# Alert inhibition rules (suppress alerts based on other alerts)
inhibit_rules:
  # Inhibit warning if critical is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  # Inhibit all alerts if service is down
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['instance']

# Receiver configurations
receivers:
  # Default receiver (console logging)
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:5001/webhook'
        send_resolved: true

  # Critical alerts receiver
  - name: 'critical-alerts'
    # Slack configuration (uncomment and configure)
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
    #     channel: '#critical-alerts'
    #     title: 'CRITICAL ALERT: {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    #     send_resolved: true

    # Email configuration (uncomment and configure)
    # email_configs:
    #   - to: 'oncall@yourdomain.com'
    #     headers:
    #       Subject: 'CRITICAL: {{ .GroupLabels.alertname }}'
    #     html: |
    #       <h2>Critical Alert Fired</h2>
    #       {{ range .Alerts }}
    #       <h3>{{ .Labels.alertname }}</h3>
    #       <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
    #       <p><strong>Description:</strong> {{ .Annotations.description }}</p>
    #       <p><strong>Runbook:</strong> <pre>{{ .Annotations.runbook }}</pre></p>
    #       {{ end }}

    # PagerDuty configuration (uncomment and configure)
    # pagerduty_configs:
    #   - routing_key: 'your-pagerduty-integration-key'
    #     description: '{{ .GroupLabels.alertname }}: {{ .GroupLabels.instance }}'
    #     severity: 'critical'
    #     details:
    #       firing: '{{ .Alerts.Firing | len }}'
    #       resolved: '{{ .Alerts.Resolved | len }}'

    webhook_configs:
      - url: 'http://localhost:5001/webhook/critical'
        send_resolved: true

  # Warning alerts receiver
  - name: 'warning-alerts'
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
    #     channel: '#alerts'
    #     title: 'WARNING: {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    #     send_resolved: true

    webhook_configs:
      - url: 'http://localhost:5001/webhook/warning'
        send_resolved: true

  # Info alerts receiver
  - name: 'info-alerts'
    webhook_configs:
      - url: 'http://localhost:5001/webhook/info'
        send_resolved: true

  # Database team receiver
  - name: 'database-team'
    # email_configs:
    #   - to: 'database-team@yourdomain.com'
    #     headers:
    #       Subject: 'Database Alert: {{ .GroupLabels.alertname }}'

    webhook_configs:
      - url: 'http://localhost:5001/webhook/database'
        send_resolved: true

  # Development team receiver
  - name: 'dev-team'
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
    #     channel: '#dev-alerts'
    #     title: 'Application Alert: {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

    webhook_configs:
      - url: 'http://localhost:5001/webhook/dev'
        send_resolved: true

  # Business team receiver
  - name: 'business-team'
    # email_configs:
    #   - to: 'business-team@yourdomain.com'
