spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ordersystem}?currentSchema=order_service
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

security:
  secret: ${JWT_SECRET_KEY:${ORDER_SERVICE_JWT_SECRET:?ORDER_SERVICE_JWT_SECRET is required}}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
    allow-credentials: false
