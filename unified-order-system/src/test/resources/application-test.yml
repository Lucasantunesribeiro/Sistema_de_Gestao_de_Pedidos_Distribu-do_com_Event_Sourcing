# Test configuration for integration tests
spring:
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - com.ordersystem.common.messaging.MessagingAutoConfiguration
  datasource:
    hikari:
      maximum-pool-size: 30
      minimum-idle: 2
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration/postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  task:
    scheduling:
      enabled: false

management:
  health:
    redis:
      enabled: false
    rabbit:
      enabled: false

logging:
  level:
    com.ordersystem.unified: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

inventory:
  mock-mode: false
  default-stock: 0

app:
  redis:
    enabled: false
  messaging:
    outbox:
      enabled: false

security:
  secret: test-secret-key-test-secret-key-1234567890
  enforce-authentication: true
  bootstrap-admin:
    enabled: true
    username: admin
    password: Admin123!SecurePass
    email: admin@example.com
    roles:
      - ADMIN

payment:
  gateway:
    enabled: false

test:
  performance:
    enabled: false
    timeout: 30000
  mock:
    payment:
      success-rate: 0.95
    inventory:
      default-stock: 0
