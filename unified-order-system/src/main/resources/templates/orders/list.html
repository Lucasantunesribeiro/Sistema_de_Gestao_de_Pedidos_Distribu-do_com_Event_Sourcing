<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Unified Order System</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="app">
  <div th:replace="~{layout/base :: layout(~{::main})}">
    <main>
      <!-- Filters and Search -->
      <div class="section">
        <div class="card">
          <div class="card-body">
            <form id="order-filters" class="filter-grid">
              <div class="form-group">
                <label class="form-label">Search Orders</label>
                <input type="text" class="form-control" placeholder="Order ID, customer name..." id="search-input" name="search">
              </div>
              <div class="form-group">
                <label class="form-label">Status</label>
                <select class="form-control" id="status-filter" name="status">
                  <option value="">All Statuses</option>
                  <option value="PENDING">Pending</option>
                  <option value="CONFIRMED">Confirmed</option>
                  <option value="PROCESSING">Processing</option>
                  <option value="CANCELLED">Cancelled</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">&nbsp;</label>
                <div style="display: flex; gap: 0.5rem;">
                  <button type="submit" class="btn btn-primary" style="flex: 1;">
                    <i class="fas fa-filter"></i> Filter
                  </button>
                  <button type="button" class="btn btn-outline" onclick="clearFilters()">
                    <i class="fas fa-times"></i>
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Orders Table -->
      <div class="section">
        <div class="card">
          <div class="card-header">
            <div>
              <h3 class="card-title">Order List</h3>
              <p class="card-subtitle" id="orders-count">Loading orders...</p>
            </div>
            <div style="display: flex; gap: 0.5rem;">
              <button class="btn btn-outline btn-sm" onclick="refreshOrders()">
                <i class="fas fa-sync-alt"></i> Refresh
              </button>
              <a href="/orders/create" class="btn btn-primary btn-sm">
                <i class="fas fa-plus"></i> New Order
              </a>
            </div>
          </div>
          <div class="card-body">
            <div id="orders-table-container">
              <!-- Loading State -->
              <div class="loading-state" id="loading-state">
                <div class="spinner"></div>
                <span>Loading orders...</span>
              </div>

              <!-- Orders Table -->
              <div id="orders-table" class="hidden">
                <div class="table-responsive">
                  <table class="table">
                    <thead>
                      <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Status</th>
                        <th>Total</th>
                        <th>Created</th>
                        <th>Actions</th>
                      </tr>
                    </thead>
                    <tbody id="orders-tbody">
                    </tbody>
                  </table>
                </div>

                <!-- Pagination -->
                <div class="pagination-bar">
                  <div class="pagination-info">
                    Showing <span id="showing-from">1</span> to <span id="showing-to">10</span>
                    of <span id="total-orders">0</span> orders
                  </div>
                  <div class="pagination-controls" id="pagination-controls"></div>
                </div>
              </div>

              <!-- Empty State -->
              <div id="empty-state" class="hidden">
                <div class="empty-state">
                  <div class="empty-icon"><i class="fas fa-shopping-bag"></i></div>
                  <h3>No orders found</h3>
                  <p>Create your first order to get started</p>
                  <a href="/orders/create" class="btn btn-primary">
                    <i class="fas fa-plus mr-1"></i> Create Order
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Order Details Modal -->
      <div id="order-modal" class="modal-overlay hidden">
        <div class="modal">
          <div class="modal-header">
            <h3 class="modal-title" id="modal-title">Order Details</h3>
            <button class="btn btn-ghost btn-sm" onclick="closeOrderModal()">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <div class="modal-body" id="modal-body"></div>
          <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeOrderModal()">Close</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script th:src="@{/js/app.js}"></script>
  <script th:src="@{/js/orders.js}"></script>
</body>

</html>
