<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle ?: 'Unified Order System'}">Unified Order System</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body class="app">
  <!--/* Layout fragment: receives page content as parameter */-->
  <th:block th:fragment="layout(content)">
    <div class="app-layout">
      <!-- Sidebar Navigation -->
      <aside class="app-sidebar" id="sidebar">
        <div class="sidebar-header">
          <a th:href="@{/dashboard}" class="sidebar-logo">
            <div class="sidebar-logo-icon"><i class="fas fa-cube"></i></div>
            <div>
              <h2 class="sidebar-logo-text">Order System</h2>
              <p class="sidebar-logo-version">v2.0.0</p>
            </div>
          </a>
        </div>

        <nav class="sidebar-nav" role="navigation" aria-label="Main navigation">
          <a th:href="@{/dashboard}" class="sidebar-nav-item"
            th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
            <i class="fas fa-chart-pie sidebar-nav-icon"></i>
            Dashboard
          </a>

          <a th:href="@{/orders}" class="sidebar-nav-item"
            th:classappend="${activePage == 'orders'} ? 'active' : ''">
            <i class="fas fa-shopping-bag sidebar-nav-icon"></i>
            Orders
          </a>

          <a th:href="@{/payments}" class="sidebar-nav-item"
            th:classappend="${activePage == 'payments'} ? 'active' : ''">
            <i class="fas fa-credit-card sidebar-nav-icon"></i>
            Payments
          </a>

          <a th:href="@{/inventory}" class="sidebar-nav-item"
            th:classappend="${activePage == 'inventory'} ? 'active' : ''">
            <i class="fas fa-boxes-stacked sidebar-nav-icon"></i>
            Inventory
          </a>

          <a th:href="@{/customers}" class="sidebar-nav-item"
            th:classappend="${activePage == 'customers'} ? 'active' : ''">
            <i class="fas fa-users sidebar-nav-icon"></i>
            Customers
          </a>

          <a th:href="@{/analytics}" class="sidebar-nav-item"
            th:classappend="${activePage == 'analytics'} ? 'active' : ''">
            <i class="fas fa-chart-line sidebar-nav-icon"></i>
            Analytics
          </a>

          <div class="sidebar-divider"></div>

          <a th:href="@{/settings}" class="sidebar-nav-item"
            th:classappend="${activePage == 'settings'} ? 'active' : ''">
            <i class="fas fa-gear sidebar-nav-icon"></i>
            Settings
          </a>
        </nav>
      </aside>

      <!-- Main Content Area -->
      <div class="app-main">
        <!-- Header -->
        <header class="app-header">
          <div class="header-left">
            <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle navigation menu">
              <i class="fas fa-bars"></i>
            </button>
            <div class="header-title-area">
              <h1 class="header-title" th:text="${pageTitle ?: 'Dashboard'}">Dashboard</h1>
              <p class="header-subtitle" th:text="${pageSubtitle ?: ''}"></p>
            </div>
          </div>

          <div class="header-right">
            <button class="header-action-btn" onclick="refreshPage()" title="Refresh data">
              <i class="fas fa-sync-alt"></i>
            </button>
            <div class="header-user">
              <div class="header-user-avatar">A</div>
              <span class="header-user-name">Admin</span>
            </div>
          </div>
        </header>

        <!-- Main Content -->
        <div class="app-content" id="main-content">
          <th:block th:replace="${content}" />
        </div>
      </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="loading-card">
        <div class="loading-spinner"></div>
        <span>Loading...</span>
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
  </th:block>
</body>

</html>
