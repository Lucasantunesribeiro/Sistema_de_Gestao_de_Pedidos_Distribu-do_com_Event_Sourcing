<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Unified Order System</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="app">
  <div th:replace="~{layout/base :: layout(~{::main})}">
    <main>
      <div class="section">
        <div class="card">
          <div class="card-body empty-state">
            <div class="empty-icon"><i class="fas fa-gear"></i></div>
            <h3>Settings</h3>
            <p>System configuration module coming soon.</p>
            <a href="/dashboard" class="btn btn-primary"><i class="fas fa-chart-pie mr-1"></i> Go to Dashboard</a>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script th:src="@{/js/app.js}"></script>
</body>
</html>
