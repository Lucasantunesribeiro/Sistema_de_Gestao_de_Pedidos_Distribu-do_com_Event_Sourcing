spring:
  application:
    name: orderflow

  jackson:
    serialization:
      write-dates-as-timestamps: false

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:none}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true
    open-in-view: false
  
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  
  cache:
    type: ${CACHE_TYPE:simple}
    redis:
      time-to-live: ${CACHE_TTL:3600000}
  
server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}

# Distributed tracing — exports spans to Tempo (via Zipkin-compatible endpoint)
spring.zipkin:
  base-url: ${ZIPKIN_BASE_URL:http://localhost:9411}
  enabled: ${TRACING_ENABLED:false}

logging:
  level:
    com.ordersystem: ${LOG_LEVEL:INFO}
    org.springframework.web: ${WEB_LOG_LEVEL:WARN}
    org.springframework.security: WARN
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Custom application properties
app:
  redis:
    enabled: ${REDIS_ENABLED:false}
    cache-ttl: ${CACHE_TTL:3600}
  
  order:
    max-items-per-order: ${MAX_ITEMS:10}
    default-timeout: ${ORDER_TIMEOUT:30000}
  
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "Authorization,Content-Type,X-Correlation-ID"

security:
  secret: ${SECURITY_SECRET:${JWT_SECRET_KEY:}}
  enforce-authentication: ${SECURITY_ENFORCE_AUTH:true}
  content-security-policy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self'"
  public-paths:
    - /favicon.ico
    - /error
    - /health
    - /health/**
    - /actuator/health
    - /api/auth/**
    - /api/health/**
    - /ws/**
    - /swagger-ui/**
    - /swagger-ui.html
    - /v3/api-docs/**
    - /css/**
    - /js/**
    - /images/**
  bootstrap-admin:
    enabled: ${SECURITY_BOOTSTRAP_ADMIN_ENABLED:false}
    username: ${SECURITY_BOOTSTRAP_ADMIN_USERNAME:}
    password: ${SECURITY_BOOTSTRAP_ADMIN_PASSWORD:}
    email: ${SECURITY_BOOTSTRAP_ADMIN_EMAIL:}
    roles:
      - ADMIN
  h2-console-enabled: ${SECURITY_H2_CONSOLE_ENABLED:false}
  cors:
    allowed-origins: ${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}
    allowed-methods: ${SECURITY_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
    allowed-headers: ${SECURITY_CORS_ALLOWED_HEADERS:*}
    allow-credentials: ${SECURITY_CORS_ALLOW_CREDENTIALS:false}
